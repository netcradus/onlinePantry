version: '3.8'

services:
  backend:
    build: 
      context: ./server
      target: deps # Use deps stage to ensure we have node_modules, then bind mount src
    #  Ideally 'deps' isn't right because it only has deps. 'base' has nothing.
    #  Actually, for dev, we just need a node container.
    #  Let's use the 'deps' stage but overriding command.
    #  Wait, 'deps' copies package.json and runs install.
    #  We need to mount source code over it.
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./server:/app
      # Anonymous volume for node_modules to prevent host overwriting container modules if OS differs
      # But accessing from host might be weird. Standard practice for win/linux:
      - /app/node_modules 
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    networks:
      - app-network

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173" # Vite default
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
